version: '3.8'services:  kafka:    image: confluentinc/cp-kafka:latest    container_name: kafka    ports:      - "9092:9092"    environment:      KAFKA_NODE_ID: 1      KAFKA_PROCESS_ROLES: 'broker,controller'      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093'      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1      KAFKA_CLUSTER_ID: 'MkU3OEVBNT-VjOD-TRw'    networks:      - hotel_network    healthcheck:      test: ["CMD-SHELL", "kafka-cluster cluster-id --bootstrap-server localhost:9092 || exit 1"]      interval: 10s      timeout: 10s      retries: 5      start_period: 20s  mailpit:    image: axllent/mailpit    container_name: mailpit    ports:      - "8025:8025"      - "1025:1025"    networks:      - hotel_network  auth-postgres:    image: postgres:15-alpine    container_name: auth_postgres_db    environment:      POSTGRES_USER: postgres      POSTGRES_PASSWORD: postgres      POSTGRES_DB: auth_db    ports:      - "5431:5432"    volumes:      - auth_postgres_data:/var/lib/postgresql/data    networks:      - hotel_network    healthcheck:      test: ["CMD-SHELL", "pg_isready -U postgres"]      interval: 5s      timeout: 5s      retries: 5  auth-redis:    image: redis:7-alpine    container_name: auth_redis_cache    ports:      - "6371:6379"    volumes:      - auth_redis_data:/data    networks:      - hotel_network    healthcheck:      test: ["CMD", "redis-cli", "ping"]      interval: 5s      timeout: 3s      retries: 5  hotel-postgres:    image: postgres:15-alpine    container_name: hotel_postgres_db    environment:      POSTGRES_USER: postgres      POSTGRES_PASSWORD: postgres      POSTGRES_DB: hotel_db    ports:      - "5432:5432"    volumes:      - hotel_postgres_data:/var/lib/postgresql/data    networks:      - hotel_network    healthcheck:      test: ["CMD-SHELL", "pg_isready -U postgres"]      interval: 5s      timeout: 5s      retries: 5  hotel-redis:    image: redis:7-alpine    container_name: hotel_redis_cache    ports:      - "6372:6379"    volumes:      - hotel_redis_data:/data    networks:      - hotel_network    healthcheck:      test: ["CMD", "redis-cli", "ping"]      interval: 5s      timeout: 3s      retries: 5  booking-db:    image: postgres:15-alpine    container_name: booking-db    environment:      POSTGRES_USER: postgres      POSTGRES_PASSWORD: postgres      POSTGRES_DB: booking_db    ports:      - "5433:5432"    volumes:      - booking-db-data:/var/lib/postgresql/data    networks:      - hotel_network    healthcheck:      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_db"]      interval: 5s      timeout: 5s      retries: 5  payment-db:    image: postgres:15-alpine    container_name: payment-db    environment:      POSTGRES_USER: postgres      POSTGRES_PASSWORD: postgres      POSTGRES_DB: payment_db    ports:      - "5434:5432"    volumes:      - payment-db-data:/var/lib/postgresql/data    networks:      - hotel_network    healthcheck:      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]      interval: 5s      timeout: 5s      retries: 5  auth-service:    build:      context: ./auth-service      dockerfile: Dockerfile    container_name: auth_service_app    ports:      - "8081:8081"    environment:      - DB_AUTH_HOST=auth-postgres      - DB_AUTH_PORT=5432      - DB_AUTH_NAME=auth_db      - DB_AUTH_USER=postgres      - DB_AUTH_PASSWORD=postgres      - REDIS_HOST=auth-redis      - REDIS_PORT=6379      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970    depends_on:      auth-postgres:        condition: service_healthy      auth-redis:        condition: service_healthy    networks:      - hotel_network  hotel-service:    build:      context: ./hotel-service      dockerfile: Dockerfile    container_name: hotel_service_app    ports:      - "8082:8082"    environment:      - DB_HOST=hotel-postgres      - DB_PORT=5432      - DB_NAME=hotel_db      - DB_USER=postgres      - DB_PASSWORD=postgres      - REDIS_HOST=hotel-redis      - REDIS_PORT=6379    depends_on:      hotel-postgres:        condition: service_healthy      hotel-redis:        condition: service_healthy    networks:      - hotel_network  booking-service:    build:      context: ./booking-service      dockerfile: Dockerfile    container_name: booking-service    ports:      - "8083:8083"    environment:      - SPRING_PROFILES_ACTIVE=prod      - DB_HOST=booking-db      - DB_PORT=5432      - DB_USER=postgres      - DB_PASSWORD=postgres      - DB_NAME=booking_db      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092    depends_on:      booking-db:        condition: service_healthy      kafka:        condition: service_healthy    networks:      - hotel_network  payment-service:    build:      context: ./payment-service      dockerfile: Dockerfile    container_name: payment-service    ports:      - "8084:8084"    environment:      - SPRING_PROFILES_ACTIVE=prod      - DB_HOST=payment-db      - DB_PORT=5432      - DB_USER=postgres      - DB_PASSWORD=postgres      - DB_NAME=payment_db      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092      - AUTH_SERVICE_URL=http://auth-service:8081      - HOTEL_SERVICE_URL=http://hotel-service:8082    depends_on:      payment-db:        condition: service_healthy      kafka:        condition: service_healthy    networks:      - hotel_network  notification-service:    build:      context: ./notification-service      dockerfile: Dockerfile    container_name: notification-service    ports:      - "8085:8085"    environment:      - SPRING_PROFILES_ACTIVE=prod      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092    depends_on:      kafka:        condition: service_healthy      mailpit:        condition: service_started    networks:      - hotel_network  api-gateway:    build:      context: ./api-gateway      dockerfile: Dockerfile    container_name: api_gateway_app    ports:      - "4000:4000"    environment:      - AUTH_SERVICE_HOST=auth-service      - HOTEL_SERVICE_HOST=hotel-service      - BOOKING_SERVICE_HOST=booking-service      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970    depends_on:      - auth-service      - hotel-service      - booking-service    networks:      - hotel_networknetworks:  hotel_network:    driver: bridgevolumes:  auth_postgres_data:  auth_redis_data:  hotel_postgres_data:  hotel_redis_data:  booking-db-data:  payment-db-data: