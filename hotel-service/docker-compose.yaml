version: '3.8'

services:
  hotel-postgres:
    image: postgres:15-alpine
    container_name: hotel_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel_db
    ports:
      - "5432:5432"
    volumes:
      - hotel_postgres_data:/var/lib/postgresql/data
    networks:
      - hotel_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  hotel-redis:
    image: redis:7-alpine
    container_name: hotel_redis_cache
    ports:
      - "6372:6379"
    volumes:
      - hotel_redis_data:/data
    networks:
      - hotel_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  hotel-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel_service_app
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=hotel-postgres
      - DB_PORT=5432
      - DB_NAME=hotel_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=hotel-redis
      - REDIS_PORT=6379
    depends_on:
      hotel-postgres:
        condition: service_healthy
      hotel-redis:
        condition: service_healthy
    networks:
      - hotel_network

volumes:
  hotel_postgres_data:
  hotel_redis_data:

networks:
  hotel_network:
    external: true